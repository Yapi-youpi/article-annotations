<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <title>Аннотатор текстов статей</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <script>
      // Restore original URL after GitHub Pages 404.html redirect.
      // 404.html encodes the original path as ?p=<path>[&q=<original-query>].
      (function () {
        var params = new URLSearchParams(window.location.search);
        var p = params.get('p');
        if (p) {
          var q = params.get('q');
          var basePath = document.baseURI.replace(window.location.origin, '').replace(/\/$/, '');
          window.history.replaceState(
            null,
            null,
            basePath + p + (q ? '?' + q : '') + window.location.hash
          );
        }
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
